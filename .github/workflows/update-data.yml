name: Update permit data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install   # instead of npm ci
      - run: npm run scrape
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update permit data"
          file_pattern: public/data/*.json
